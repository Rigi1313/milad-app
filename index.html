<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milad Mehr App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background: #4CAF50;
            color: white;
            padding: 18px 40px;
            font-size: 22px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        .fallback {
            margin-top: 20px;
            color: #666;
            font-size: 16px;
        }
        .fallback a {
            color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Milad Mehr App</h1>

        <!-- دکمه باز کردن اپ با روش جدید -->
        <a href="https://rigi1313.github.io/milad-app/open-app" class="btn" id="openAppBtn">
            📱 باز کردن اپلیکیشن
        </a>

        <div class="fallback">
            اگر اپ نصب نیست، 
            <a href="https://play.google.com/store/apps/details?id=com.miladmehr.app">از گوگل پلی دانلود کنید</a>
        </div>
    </div>

    <script>
        document.getElementById('openAppBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // تلاش برای باز کردن اپ با intent
            var intentUrl = 'intent://milad-app/#Intent;scheme=https;package=com.miladmehr.app;end';
            
            // ایجاد یک iframe مخفی برای باز کردن intent
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = intentUrl;
            document.body.appendChild(iframe);
            
            // اگر اپ باز نشد، بعد از 2 ثانیه به گوگل پلی برو
            setTimeout(function() {
                window.location.href = 'https://play.google.com/store/apps/details?id=com.miladmehr.app';
            }, 2000);
        });
    </script>
</body>
            </html>
